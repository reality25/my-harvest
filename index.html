<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Harvest - Agricultural Community</title>
    <meta name="description" content="Connect with farmers, manage your farm, access markets and expert advice with Harvest." />
    <meta name="author" content="Harvest" />
    <meta name="theme-color" content="#2d6a4f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Harvest" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Harvest - Agricultural Community" />
    <meta property="og:description" content="Connect with farmers, manage your farm, access markets and expert advice." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Harvest - Agricultural Community" />
    <meta name="twitter:description" content="Connect with farmers, manage your farm, access markets and expert advice." />
  </head>
  <body>
    <script>
      // Apply theme preference before first paint to avoid a flash of light theme
      (function () {
        try {
          var pref = localStorage.getItem("harvest_theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = pref === "dark" || (pref === null && prefersDark);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) { /* localStorage may be blocked */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
